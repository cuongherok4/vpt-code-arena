name: Judge Service CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'judge-service/**'
      - '.github/workflows/judge-service-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'judge-service/**'
      - '.github/workflows/judge-service-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./judge-service

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './judge-service/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build and test
      run: npm test
