spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE DOMAIN IF NOT EXISTS judge_result AS VARCHAR(20)\;CREATE DOMAIN IF NOT EXISTS room_status AS VARCHAR(20)\;CREATE DOMAIN IF NOT EXISTS difficulty_type AS VARCHAR(20)\;CREATE DOMAIN IF NOT EXISTS role_type AS VARCHAR(20)
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false # disable flyway for tests

judge0:
  url: http://localhost:2358
